<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Brain</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070a;
        --surface: #101318;
        --panel: rgba(20, 24, 30, 0.84);
        --panel-2: rgba(32, 39, 48, 0.58);
        --ink: #f5f5f7;
        --muted: #a8b2bd;
        --muted-2: #74808d;
        --line: rgba(255, 255, 255, 0.12);
        --topic: #9fd9bd;
        --domain: #d5dde7;
        --paper: #a8d9ff;
        --local: #a7d4ec;
        --repo: #d9c68b;
        --seed: #bbc7f2;
        --project: #ff8a7a;
        --edge: rgba(172, 218, 255, 0.2);
        --grid: rgba(168, 217, 255, 0.06);
        --accent: #a8d9ff;
        --accent-soft: rgba(168, 217, 255, 0.16);
        --topic-soft: rgba(159, 217, 189, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #05070a 0%, #0b0f14 100%);
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        min-height: 100vh;
      }

      .graph-shell {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          linear-gradient(180deg, var(--grid) 1px, transparent 1px),
          linear-gradient(180deg, rgba(9, 13, 18, 0.12), rgba(5, 7, 10, 0.96));
        background-size: 80px 80px, 80px 80px, 100% 100%;
      }

      .graph-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(210, 234, 255, 0.035), transparent 22%),
          repeating-linear-gradient(0deg, rgba(210, 234, 255, 0.03) 0 1px, transparent 1px 8px);
        opacity: 0.5;
      }

      .graph-shell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, transparent 0 45%, rgba(168, 217, 255, 0.055) 46%, transparent 47% 100%),
          linear-gradient(180deg, rgba(168, 217, 255, 0.04), transparent 38%);
        opacity: 0.24;
      }

      header {
        position: absolute;
        z-index: 5;
        top: 18px;
        left: 22px;
        right: 22px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .title-input {
        display: block;
        width: min(720px, 52vw);
        min-width: 280px;
        pointer-events: auto;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ink);
        border-radius: 8px;
        padding: 2px 6px 4px;
        font: inherit;
        font-size: clamp(24px, 3vw, 42px);
        font-weight: 800;
        line-height: 1.02;
        box-shadow: none;
      }

      .title-input:hover,
      .title-input:focus {
        border-color: rgba(168, 217, 255, 0.24);
        background: rgba(168, 217, 255, 0.055);
        outline: none;
      }

      .subtitle {
        display: none;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        pointer-events: auto;
      }

      button,
      input,
      select {
        border: 1px solid var(--line);
        background: rgba(20, 24, 30, 0.72);
        color: var(--ink);
        border-radius: 8px;
        font: inherit;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      }

      button {
        height: 36px;
        padding: 0 12px;
        cursor: pointer;
      }

      button:hover {
        border-color: rgba(245, 245, 247, 0.3);
        background: rgba(34, 42, 52, 0.8);
      }

      #graph {
        width: 100%;
        height: 100vh;
        display: block;
      }

      aside {
        border-left: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(28px) saturate(140%);
        padding: 18px;
        overflow: auto;
        max-height: 100vh;
      }

      .search {
        width: 100%;
        height: 40px;
        padding: 0 12px;
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .search-row .search {
        min-width: 0;
      }

      .search-status {
        min-height: 0;
        margin-top: 7px;
        color: var(--muted);
        font-size: 12px;
      }

      .search-status.search-hit {
        color: #cfe7ff;
      }

      .search-status.search-miss {
        color: #f0b9ad;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 10px 0 0;
      }

      .controls button {
        width: 100%;
      }

      .filters {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin: 10px 0 0;
      }

      .layer-readout {
        display: none;
      }

      .filters select {
        width: 100%;
        height: 38px;
        padding: 0 10px;
      }

      .top-filter-active {
        border-color: rgba(168, 217, 255, 0.62);
        background: rgba(168, 217, 255, 0.14);
        color: #d7ecff;
      }

      .top-filter-active.today-active {
        border-color: rgba(159, 217, 189, 0.68);
        background: rgba(159, 217, 189, 0.14);
        color: #d8ffe9;
      }

      .favorite-active {
        border-color: rgba(168, 217, 255, 0.62);
        background: rgba(168, 217, 255, 0.14);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 14px 0;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: var(--panel-2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      }

      .stat strong {
        display: block;
        font-size: 20px;
      }

      .stat span {
        color: var(--muted);
        font-size: 12px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        background: rgba(255, 255, 255, 0.025);
      }

      .legend .chip {
        height: auto;
        min-height: 28px;
        padding: 4px 9px;
        line-height: 1.2;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          color 160ms ease,
          opacity 160ms ease,
          box-shadow 160ms ease;
      }

      .legend .chip:hover,
      .legend .chip:focus-visible {
        border-color: rgba(245, 245, 247, 0.34);
        background: rgba(168, 217, 255, 0.08);
        outline: none;
      }

      .legend .legend-active {
        border-color: rgba(168, 217, 255, 0.62);
        background: rgba(168, 217, 255, 0.13);
        color: #e1f1ff;
        box-shadow:
          0 0 0 1px rgba(168, 217, 255, 0.08),
          0 0 22px rgba(168, 217, 255, 0.08);
      }

      .legend .legend-muted {
        opacity: 0.48;
      }

      .legend-paper-group {
        display: inline-flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;
        min-height: 32px;
        padding: 2px;
        border: 1px solid rgba(168, 217, 255, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.018);
        transition:
          border-color 160ms ease,
          background 160ms ease,
          opacity 160ms ease;
      }

      .legend-paper-group.paper-group-active {
        border-color: rgba(168, 217, 255, 0.34);
        background: rgba(168, 217, 255, 0.045);
      }

      .paper-quality-options {
        display: inline-flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
      }

      .paper-quality-option {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-height: 24px;
        padding: 2px 7px;
        border: 1px solid rgba(168, 217, 255, 0.16);
        border-radius: 999px;
        color: var(--muted-2);
        font-size: 11px;
        line-height: 1.1;
        cursor: pointer;
        user-select: none;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          color 160ms ease,
          opacity 160ms ease;
      }

      .paper-quality-option:hover {
        border-color: rgba(168, 217, 255, 0.36);
        color: #d7ecff;
      }

      .paper-quality-option input {
        width: 11px;
        height: 11px;
        margin: 0;
        appearance: none;
        border: 1px solid rgba(168, 217, 255, 0.42);
        border-radius: 3px;
        background: rgba(5, 7, 10, 0.7);
        box-shadow: none;
      }

      .paper-quality-option input:checked {
        border-color: rgba(168, 217, 255, 0.82);
        background:
          linear-gradient(135deg, transparent 0 48%, rgba(5, 7, 10, 0.92) 50% 58%, transparent 60%),
          var(--paper);
      }

      .paper-quality-option.quality-active {
        border-color: rgba(168, 217, 255, 0.48);
        background: rgba(168, 217, 255, 0.1);
        color: #e1f1ff;
      }

      .paper-quality-option.quality-muted {
        opacity: 0.52;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .mark {
        width: 13px;
        height: 13px;
        display: inline-block;
        border: 2px solid currentColor;
        background: currentColor;
      }

      .mark-project {
        border-radius: 3px;
        color: var(--project);
      }

      .mark-all {
        border-radius: 50%;
        color: var(--accent);
        background:
          radial-gradient(circle, currentColor 0 30%, transparent 32%),
          conic-gradient(from 45deg, var(--paper), var(--topic), var(--repo), var(--seed), var(--paper));
      }

      .mark-paper {
        border-radius: 50%;
        color: var(--paper);
      }

      .mark-topic {
        border: 0;
        width: 16px;
        height: 10px;
        border-radius: 999px;
        color: var(--topic);
        background: currentColor;
      }

      .mark-domain {
        border: 0;
        color: var(--domain);
        background: currentColor;
        clip-path: polygon(50% 0, 95% 24%, 95% 76%, 50% 100%, 5% 76%, 5% 24%);
      }

      .mark-seed {
        color: var(--seed);
        transform: rotate(45deg);
      }

      .mark-local {
        width: 11px;
        border-radius: 2px;
        color: var(--local);
      }

      .mark-repo {
        color: var(--repo);
        clip-path: polygon(8% 20%, 38% 20%, 46% 6%, 92% 6%, 92% 92%, 8% 92%);
      }

      .type-pill {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 2px 7px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 10px 0 4px;
      }

      .signal-tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 3px 8px;
        border: 1px solid rgba(217, 198, 139, 0.46);
        border-radius: 999px;
        background: rgba(217, 198, 139, 0.12);
        color: #eadba6;
        font-size: 12px;
        font-weight: 800;
      }

      .quality-pill {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 2px 8px;
        border: 1px solid rgba(168, 217, 255, 0.36);
        border-radius: 999px;
        background: rgba(168, 217, 255, 0.1);
        color: #d7ecff;
        font-size: 12px;
        font-weight: 800;
      }

      .quality-needs_deep_read,
      .quality-auto_imported {
        border-color: rgba(240, 185, 173, 0.38);
        background: rgba(240, 185, 173, 0.09);
        color: #f4c7bd;
      }

      .quality-quick_checked {
        border-color: rgba(217, 198, 139, 0.42);
        background: rgba(217, 198, 139, 0.1);
        color: #eadba6;
      }

      .quality-deep_read {
        border-color: rgba(168, 217, 255, 0.55);
        background: rgba(168, 217, 255, 0.14);
        color: #e1f1ff;
      }

      .quality-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.025);
      }

      .quality-warning {
        color: #f4c7bd;
      }

      .figure-grid {
        display: grid;
        gap: 10px;
        margin-top: 8px;
      }

      .figure-grid figure {
        position: relative;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(10, 10, 12, 0.78);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.24);
      }

      .figure-grid img {
        display: block;
        width: 100%;
        max-height: 320px;
        object-fit: contain;
        background: #0a0a0c;
      }

      .figure-grid figure.image-missing::after {
        content: "Embedded figure unavailable";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--muted);
        background: rgba(10, 10, 12, 0.94);
        font-size: 12px;
        text-align: center;
      }

      .figure-grid figcaption {
        padding: 7px 9px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .detail {
        border-top: 1px solid var(--line);
        padding-top: 16px;
      }

      .detail h2 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.2;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .abstract {
        margin-top: 12px;
        line-height: 1.55;
        font-size: 14px;
      }

      .section {
        margin-top: 14px;
      }

      .section-title {
        margin-bottom: 6px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .section ul {
        margin: 0;
        padding-left: 18px;
      }

      .section li {
        margin: 5px 0;
        line-height: 1.45;
        font-size: 13px;
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .list {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .item {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.018);
        overflow: hidden;
      }

      .item::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        background: var(--domain);
        opacity: 0.76;
      }

      .item:hover {
        border-color: rgba(245, 245, 247, 0.28);
        background: rgba(168, 217, 255, 0.055);
      }

      .item-selected {
        border-color: rgba(245, 245, 247, 0.36);
        background: rgba(168, 217, 255, 0.08);
      }

      .item-paper::before {
        background: var(--paper);
      }

      .item-local_pdf::before {
        background: var(--local);
      }

      .item-code_repo::before {
        background: var(--repo);
      }

      .item-topic::before {
        background: var(--topic);
      }

      .item-seed::before {
        background: var(--seed);
      }

      .item-project::before {
        background: var(--project);
      }

      .item-today {
        border-color: rgba(159, 217, 189, 0.28);
        background: linear-gradient(90deg, rgba(159, 217, 189, 0.08), rgba(168, 217, 255, 0.035));
      }

      .item-title {
        display: flex;
        align-items: flex-start;
        gap: 7px;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
      }

      .item-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .node-mini {
        flex: 0 0 auto;
        width: 11px;
        height: 11px;
        margin-top: 3px;
        border-radius: 50%;
        background: var(--paper);
        box-shadow: 0 0 12px rgba(168, 217, 255, 0.2);
      }

      .node-mini-topic {
        width: 14px;
        height: 9px;
        border-radius: 999px;
        background: var(--topic);
      }

      .node-mini-domain {
        border-radius: 0;
        background: var(--domain);
        clip-path: polygon(50% 0, 95% 24%, 95% 76%, 50% 100%, 5% 76%, 5% 24%);
      }

      .node-mini-code_repo {
        border-radius: 0;
        background: var(--repo);
        clip-path: polygon(8% 20%, 38% 20%, 46% 6%, 92% 6%, 92% 92%, 8% 92%);
      }

      .node-mini-local_pdf {
        width: 9px;
        height: 13px;
        border-radius: 2px;
        background: var(--local);
      }

      .node-mini-seed {
        border-radius: 0;
        background: var(--seed);
        transform: rotate(45deg);
      }

      .node-mini-project {
        border-radius: 2px;
        background: var(--project);
      }

      .inline-tag {
        display: inline-flex;
        align-items: center;
        min-height: 18px;
        margin-left: 5px;
        padding: 1px 6px;
        border: 1px solid rgba(159, 217, 189, 0.42);
        border-radius: 999px;
        color: #d8ffe9;
        background: rgba(159, 217, 189, 0.1);
        font-size: 10px;
        font-weight: 800;
      }

      .neighbor-group {
        display: grid;
        gap: 7px;
        margin-top: 12px;
      }

      .neighbor-group-title {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      a {
        color: #aac8ff;
      }

      details.sidebar-panel {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      details.sidebar-panel summary {
        min-height: 38px;
        padding: 9px 11px;
        cursor: pointer;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      details.sidebar-panel .controls {
        margin: 0;
        padding: 0 10px 10px;
      }

      .panel-body {
        padding: 0 10px 10px;
      }

      .single-control {
        grid-template-columns: 1fr;
        padding: 0;
      }

      .action-title {
        margin: 8px 0 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .compact-list {
        display: grid;
        gap: 7px;
      }

      .compact-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        min-height: 34px;
        padding: 7px 8px;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.018);
      }

      .compact-title {
        min-width: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .compact-meta {
        color: var(--muted);
        font-size: 11px;
      }

      .tiny-button {
        height: 28px;
        padding: 0 8px;
        border-radius: 7px;
        font-size: 12px;
      }

      .favorite-category-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-bottom: 8px;
      }

      .favorite-category-form input,
      .favorite-category-form select,
      .favorite-category-filter {
        width: 100%;
        height: 36px;
        padding: 0 10px;
      }

      .favorite-category-form .category-new-input {
        min-width: 0;
      }

      .favorite-category-filter {
        margin-bottom: 8px;
      }

      .favorite-category-block {
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.018);
        overflow: hidden;
      }

      .favorite-category-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        width: 100%;
        height: auto;
        min-height: 34px;
        padding: 7px 8px;
        border: 0;
        border-radius: 0;
        background: transparent;
        text-align: left;
      }

      .favorite-category-head.category-active {
        color: #e1f1ff;
        background: rgba(168, 217, 255, 0.1);
      }

      .favorite-category-items {
        display: grid;
        gap: 1px;
        padding: 0 8px 8px;
      }

      .favorite-paper-link {
        width: 100%;
        height: auto;
        min-height: 28px;
        padding: 4px 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        text-align: left;
      }

      .favorite-paper-link:hover {
        color: var(--ink);
        background: transparent;
      }

      .favorite-paper-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 104px;
        gap: 8px;
        align-items: center;
      }

      .favorite-paper-row select {
        width: 100%;
        height: 28px;
        padding: 0 6px;
        border-radius: 7px;
        color: var(--muted);
        font-size: 11px;
      }

      .export-footer {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 10px;
      }

      function loadArray(key) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function loadObject(key) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key) || "{}");
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch {
          return {};
        }
      }

      function normalizeAddedNode(node) {
        return {
          ...node,
          is_user_added: true,
          index: 0,
          x: 0,
          y: 0,
          z: 0,
          vx: 0,
          vy: 0,
          vz: 0,
        };
      }

      const storedAddedNodes = loadArray(storageKeys.addedNodes).map(normalizeAddedNode);
      const storedAddedEdges = loadArray(storageKeys.addedEdges);
      const state = {
        nodes: graph.nodes
          .map((node, index) => ({ ...node, index, x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0 }))
          .concat(storedAddedNodes),
        edges: [...(graph.edges || []), ...storedAddedEdges],
        selected: null,
        hovered: null,
        dragging: null,
        lang: loadLang(),
        favorites: loadFavorites(),
        favoriteCategories: loadObject(storageKeys.favoriteCategories),
        exportSelection: loadSet(storageKeys.exportSelection),
        hiddenNodes: loadSet(storageKeys.hidden),
        pinnedNodes: loadSet(storageKeys.pinned),
        addedNodes: storedAddedNodes,
        addedEdges: storedAddedEdges,
        favoritesOnly: false,
        todayOnly: false,
        localGraph: false,
        viewFilter: "all",

        scale: 1,
