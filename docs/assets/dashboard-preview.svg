<svg width="1440" height="840" viewBox="0 0 1440 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Paper Brain dashboard preview">
  <defs>
    <linearGradient id="bg" x1="720" y1="0" x2="720" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070A"/>
      <stop offset="1" stop-color="#10161D"/>
    </linearGradient>
    <linearGradient id="panel" x1="1052" y1="76" x2="1364" y2="782" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151B22" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0B1016" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D7F0FF"/>
      <stop offset="1" stop-color="#83CFFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDFBEA"/>
      <stop offset="1" stop-color="#9FD9BD"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2E5B2"/>
      <stop offset="1" stop-color="#D9C68B"/>
    </linearGradient>
    <filter id="glow-cyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.66 0 0 0 0.2 0 0.85 0 0 0.7 0 0 1 0 1 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" stroke="#A8D9FF" stroke-opacity="0.055"/>
    </pattern>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 1H8" stroke="#D7F0FF" stroke-opacity="0.028"/>
    </pattern>
  </defs>

  <rect width="1440" height="840" rx="36" fill="url(#bg)"/>
  <rect width="1440" height="840" rx="36" fill="url(#grid)"/>
  <rect width="1440" height="840" rx="36" fill="url(#scan)"/>
  <path d="M108 705C281 556 360 180 607 261C828 333 871 113 1044 125C1184 135 1245 247 1342 178" stroke="#A8D9FF" stroke-opacity="0.12" stroke-width="2"/>
  <path d="M110 175H983" stroke="#A8D9FF" stroke-opacity="0.08"/>
  <path d="M110 665H983" stroke="#A8D9FF" stroke-opacity="0.08"/>

  <g opacity="0.92">
    <text x="78" y="94" fill="#F5F5F7" font-family="Inter, ui-sans-serif, system-ui" font-size="42" font-weight="800">Paper Brain</text>
    <text x="80" y="130" fill="#A8B2BD" font-family="Inter, ui-sans-serif, system-ui" font-size="17">daily paper reader / research graph / deep-read workspace</text>
  </g>

  <g transform="translate(604 70)" font-family="Inter, ui-sans-serif, system-ui" font-size="14">
    <rect x="0" y="0" width="112" height="38" rx="10" fill="#A8D9FF" fill-opacity="0.13" stroke="#A8D9FF" stroke-opacity="0.45"/>
    <text x="24" y="24" fill="#D7ECFF">Today</text>
    <rect x="124" y="0" width="112" height="38" rx="10" fill="#101820" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="149" y="24" fill="#CBD5DF">Favorites</text>
    <rect x="248" y="0" width="112" height="38" rx="10" fill="#101820" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="275" y="24" fill="#CBD5DF">Export</text>
  </g>

  <g stroke-linecap="round" stroke-width="1.7">
    <path d="M245 395L409 276L619 337L791 219" stroke="#A8D9FF" stroke-opacity="0.34"/>
    <path d="M409 276L510 517L728 605" stroke="#A8D9FF" stroke-opacity="0.22"/>
    <path d="M619 337L510 517L830 430" stroke="#A8D9FF" stroke-opacity="0.25"/>
    <path d="M791 219L830 430L728 605" stroke="#A8D9FF" stroke-opacity="0.2"/>
    <path d="M245 395L208 568L510 517" stroke="#A8D9FF" stroke-opacity="0.18"/>
    <path d="M409 276L326 154L619 337" stroke="#9FD9BD" stroke-opacity="0.18"/>
    <path d="M830 430L956 343L791 219" stroke="#D9C68B" stroke-opacity="0.19"/>
  </g>

  <g filter="url(#glow-cyan)">
    <circle cx="510" cy="517" r="28" fill="url(#cyan)"/>
    <circle cx="510" cy="517" r="46" stroke="#A8D9FF" stroke-opacity="0.16"/>
  </g>
  <g filter="url(#glow-cyan)">
    <circle cx="619" cy="337" r="22" fill="#A8D9FF"/>
    <circle cx="409" cy="276" r="18" fill="#A8D9FF"/>
    <circle cx="728" cy="605" r="17" fill="#A8D9FF"/>
    <circle cx="791" cy="219" r="14" fill="#A8D9FF" fill-opacity="0.78"/>
  </g>

  <g>
    <rect x="232" y="381" width="26" height="26" rx="4" fill="#FF8A7A" filter="url(#glow-cyan)"/>
    <rect x="316" y="145" width="20" height="20" rx="3" fill="#BBC7F2"/>
    <path d="M943 333H970L964 357H943Z" fill="url(#gold)"/>
  </g>

  <g fill="url(#green)" opacity="0.96">
    <rect x="184" y="563" width="48" height="24" rx="12"/>
    <rect x="806" y="418" width="48" height="24" rx="12"/>
    <rect x="386" y="260" width="46" height="22" rx="11"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#DCE7EF">
    <text x="543" y="523">Research focus</text>
    <text x="650" y="342">VLA</text>
    <text x="440" y="280">Active perception</text>
    <text x="760" y="610">Mobile manipulation</text>
    <text x="834" y="444">Semantic mapping</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="1030" y="56" width="342" height="728" rx="24" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.11"/>
    <text x="1062" y="106" fill="#F5F5F7" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Local Graph</text>
    <rect x="1062" y="129" width="276" height="40" rx="10" fill="#080C11" stroke="#A8D9FF" stroke-opacity="0.16"/>
    <text x="1082" y="154" fill="#74808D" font-family="Inter, ui-sans-serif, system-ui" font-size="14">search papers, topics, repos</text>

    <g font-family="Inter, ui-sans-serif, system-ui" font-size="12">
      <rect x="1062" y="194" width="78" height="30" rx="15" fill="#A8D9FF" fill-opacity="0.13" stroke="#A8D9FF" stroke-opacity="0.45"/>
      <text x="1085" y="214" fill="#D7ECFF">Paper</text>
      <rect x="1148" y="194" width="78" height="30" rx="15" fill="#9FD9BD" fill-opacity="0.13" stroke="#9FD9BD" stroke-opacity="0.4"/>
      <text x="1173" y="214" fill="#DCFBE9">Topic</text>
      <rect x="1234" y="194" width="78" height="30" rx="15" fill="#D9C68B" fill-opacity="0.12" stroke="#D9C68B" stroke-opacity="0.36"/>
      <text x="1258" y="214" fill="#F0E1A8">Repo</text>
    </g>

    <text x="1062" y="272" fill="#F5F5F7" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="760">Example Seed Paper</text>
    <text x="1062" y="302" fill="#A8B2BD" font-family="Inter, ui-sans-serif, system-ui" font-size="14">quality: needs deep read</text>

    <rect x="1062" y="329" width="278" height="96" rx="14" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="1082" y="358" fill="#D7ECFF" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="760">Contribution</text>
    <text x="1082" y="386" fill="#CBD5DF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Turns raw metadata into a curated</text>
    <text x="1082" y="407" fill="#CBD5DF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">research graph and reading queue.</text>

    <rect x="1062" y="445" width="278" height="116" rx="14" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="1082" y="474" fill="#DDFBEA" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="760">Deep-read checklist</text>
    <circle cx="1086" cy="501" r="4" fill="#A8D9FF"/><text x="1100" y="506" fill="#CBD5DF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">full text inspected</text>
    <circle cx="1086" cy="528" r="4" fill="#A8D9FF"/><text x="1100" y="533" fill="#CBD5DF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">figures verified</text>

    <rect x="1062" y="586" width="84" height="38" rx="10" fill="#A8D9FF" fill-opacity="0.13" stroke="#A8D9FF" stroke-opacity="0.42"/>
    <text x="1088" y="610" fill="#D7ECFF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Hide</text>
    <rect x="1158" y="586" width="108" height="38" rx="10" fill="#101820" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="1182" y="610" fill="#CBD5DF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Restore</text>

    <path d="M1062 666H1340" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="1062" y="703" fill="#F5F5F7" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">Export basket</text>
    <text x="1062" y="730" fill="#A8B2BD" font-family="Inter, ui-sans-serif, system-ui" font-size="13">selected papers -> Markdown</text>
  </g>

  <rect x="1" y="1" width="1438" height="838" rx="35" stroke="#FFFFFF" stroke-opacity="0.1"/>
</svg>
